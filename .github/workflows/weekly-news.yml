name: Weekly Huawei News Report

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: huawei-weekly-news-pages
  cancel-in-progress: false

jobs:
  generate-report:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly report from real news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_SEARCH_API_KEY: ${{ secrets.NEWS_SEARCH_API_KEY }}
          NEWS_SEARCH_ENDPOINT: ${{ secrets.NEWS_SEARCH_ENDPOINT }}
        run: npm run report:update

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- public/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add public/data
          git commit -m "chore: update weekly news report"
          git push

      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-data
          path: public/data

  deploy:
    needs: generate-report
    if: always() && (needs.generate-report.result == 'success' || needs.generate-report.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download generated data artifact
        if: needs.generate-report.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: weekly-report-data
          path: public/data

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
